name: Deploy VitePress site to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server dist
        run: pnpm build:server

      - name: Pack dist
        run: tar czf dist.tar.gz -C docs/.vitepress dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 47.112.200.66 >> ~/.ssh/known_hosts

      - name: Upload dist
        run: scp dist.tar.gz vitepress-deploy@47.112.200.66:/opt/projects/vite-press-docs/

      - name: Deploy dist
        run: ssh vitepress-deploy@47.112.200.66 "cd /opt/projects/vite-press-docs && rm -rf dist && tar xzf dist.tar.gz"
